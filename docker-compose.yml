services:
  cloud-backend:
    build:
      context: ./
      dockerfile: Dockerfile
    restart: on-failure
    container_name: cloud-backend
    env_file:
      - ./.env
    depends_on:
      - cloud-postgres
    ports:
      - '8000:${PORT}'
    networks:
      - trumpet-proxy

  cloud-postgres:
    image: postgres:15-alpine
    container_name: cloud-postgres
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./docker/postgresql/cloud/data:/var/lib/postgresql/data/
    networks:
      - trumpet-proxy
    ports:
      - "5432"

